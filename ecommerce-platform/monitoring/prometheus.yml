global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: order
    static_configs:
      - targets: ["order-service-a:8001", "order-service-b:8001"]

  - job_name: inventory
    static_configs:
      - targets: ["inventory-service-a:8002", "inventory-service-b:8002"]

  - job_name: payment
    static_configs:
      - targets: ["payment-service-a:8003", "payment-service-b:8003"]

  - job_name: user
    static_configs:
      - targets: ["user-service-a:8004", "user-service-b:8004"]
