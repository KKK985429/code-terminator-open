name: ci

on:
  push:
    branches:
      - main
      - feat/project-bootstrap
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Check formatting
        run: uv run black --check src/datagov tests/bootstrap

      - name: Check imports
        run: uv run isort --check-only src/datagov tests/bootstrap

      - name: Type check
        run: uv run mypy --strict src

      - name: Run tests
        run: uv run pytest
